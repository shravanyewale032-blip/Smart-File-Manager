name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "SmartFileManagerPro.zip" ]; then
            unzip -o SmartFileManagerPro.zip
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle Build Scripts
        run: |
          cat << 'EOF' > build.gradle.kts
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.2.2")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22")
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          mkdir -p app
          cat << 'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
          }

          android {
              namespace = "com.smartfilemanager.pro"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.smartfilemanager.pro"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF

      - name: Setup Gradle automatically
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartFileManager-APK
          path: '**/build/outputs/apk/debug/*.apk'
